<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Boda Elena y Santi</title>
    <main>
        <div id="countdown-container">
            <h2>YA CASI ES LA FECHA PARA ESTAR TODOS REUNIDOS </h2>
            <h1 id="countdown-timer">Cargando...</h1>
        </div>
    </main>
    
    <script>
        // La fecha objetivo: 11 de abril de 2026 a medianoche (00:00:00 CET)
        const targetDate = new Date("2026-04-11T00:00:00").getTime();

        // Función principal de actualización
        function updateCountdown() {
            // 1. Hora actual
            const now = new Date().getTime();
            // 2. Diferencia en milisegundos
            const distance = targetDate - now;

            // 3. Cálculos para días, horas, minutos y segundos
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // 4. Mostrar el resultado
            document.getElementById("countdown-timer").innerHTML =
                days + " días, " + hours + "h " + minutes + "m " + seconds + "s";

            // 5. Si el conteo finaliza
            if (distance < 0) {
                clearInterval(countdownInterval); // Detener el temporizador
                document.getElementById("countdown-timer").innerHTML = "¡LA FECHA HA LLEGADO!";
            }
        }

        // Iniciar la función y hacer que se repita cada 1000ms (1 segundo)
        updateCountdown();
        const countdownInterval = setInterval(updateCountdown, 1000);
    </script>
