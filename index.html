        /* Estilos para el Contenedor de la Imagen y el Texto (simulación de la sección principal) */
        .hero-section {
            background: url('tu_imagen_de_fondo.jpg') center center/cover no-repeat; /* Cambia 'tu_imagen_de_fondo.jpg' por la URL de tu imagen */
            min-height: 500px; /* Altura mínima para mostrar la imagen */

            justify-content: center;
            align-items: center;
            color: white; /* Color blanco para el texto sobre la imagen */

        }

<body>
    <header class="header-nav">
        <span class="logo">~S & L~</span>
        <nav class="menu-items">
            <a href="#">La ceremonia</a>
            <a href="#">Confirma tu asistencia</a>
            <a href="#" class="contact-button">Contacta con los novios</a>
        </nav>
    </header>

    <div class="hero-section">
        <h1>Elena & Santi</h1>
        <p>11/04/2026</p>
        
        <div id="countdown-timer-display">Cargando contador...</div>
    </div>

    <div id="root"></div>

    <script>
        // La fecha objetivo: 11 de abril de 2026 a medianoche (00:00:00)
        const targetDate = new Date("2026-04-11T00:00:00").getTime();

        // Función que calcula y actualiza el conteo cada segundo
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Cálculos para días, horas, minutos y segundos
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Mostrar el resultado
            const timerElement = document.getElementById("countdown-timer-display");
            
            if (timerElement) {
                if (distance > 0) {
                    timerElement.innerHTML =
                        days + " días | " + hours + "h " + minutes + "m " + seconds + "s";
                } else {
                    clearInterval(countdownInterval);
                    timerElement.innerHTML = "¡LA BODA ES HOY!";
                }
            }
        }

        // Ejecutar la función inmediatamente y repetir cada 1 segundo (1000ms)
        updateCountdown();
        const countdownInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
